; llama-server Router-Mode Presets (--models-preset)
; Keys = CLI-Langoptionen ohne führende Bindestriche.
; Sektionsname = Modellname im API-Request ("model": "qwen").
; [*] = globale Defaults, pro Sektion überschreibbar.
version = 1

[*]
n-gpu-layers = 99
split-mode = layer
flash-attn = on
threads = 6
threads-batch = 6
parallel = 1
; GPU1 ist die Service-GPU (SER ~1,6 GB + whisper ~1,2 GB + speaches/piper
; ~0,5 GB reserviert). tensor-split verlagert die LLM-Last auf GPU0, damit
; die Audio-Dienste bei ctx 131072 nicht mehr per OOM verdraengt werden
; (500er im voice assistant, gefixt 2026-07-05).
tensor-split = 59,41

; Qwen3.6-27B — Settings ermittelt 2026-07-03:
; ctx 131072 + q8_0-KV = Maximum bei ~10% freiem VRAM (GPU1 ist Engpass,
; trägt zusätzlich bge-m3 + speaches). MTP bleibt an (Entscheidung Jochen).
[qwen]
; alias = Rückwärtskompatibilität: bestehende Clients nutzen "current"
alias = current
model = /models/llmfan46/Qwen3.6-27B-uncensored-heretic-v2-Native-MTP-Preserved-GGUF/Qwen3.6-27B-uncensored-heretic-v2-Native-MTP-Preserved-Q4_K_S.gguf
mmproj = /models/llmfan46/Qwen3.6-27B-uncensored-heretic-v2-Native-MTP-Preserved-GGUF/Qwen3.6-27B-mmproj-BF16.gguf
ctx-size = 131072
cache-type-k = q8_0
cache-type-v = q8_0
spec-type = draft-mtp

; gemma-4-31B, ctx 131072 seit 2026-07-05. Text-only: mmproj (1,1 GB)
; entfernt, damit gemma@131K trotz GPU1-Service-Reserve passt.
; Fuer Vision-Anfragen das Preset [gemma-vision] nutzen.
; MTP-Drafter ENTFERNT: Draft-Kontext braucht >2,5 GB extra und passt
; schon ab ctx 81920 nicht mehr (OOM, gemessen 2026-07-05; gilt auch
; fuer Q4_K_S). Trade-off: 131072 ohne MTP = 20,4 tok/s vs. 65536 mit
; MTP = 26,6 tok/s (Acceptance 0.65).
[gemma]
model = /models/llmfan46/gemma-4-31B-it-uncensored-heretic-GGUF/gemma-4-31B-it-uncensored-heretic-Q4_K_M.gguf
ctx-size = 131072
cache-type-k = q8_0
cache-type-v = q8_0

; gemma mit Vision + MTP — die bewaehrte 65536er-Config (26,6 tok/s).
[gemma-vision]
model = /models/llmfan46/gemma-4-31B-it-uncensored-heretic-GGUF/gemma-4-31B-it-uncensored-heretic-Q4_K_M.gguf
mmproj = /models/llmfan46/gemma-4-31B-it-uncensored-heretic-GGUF/gemma-4-31B-it-mmproj-BF16.gguf
model-draft = /models/unsloth/gemma-4-31B-it-GGUF/MTP/gemma-4-31B-it-Q8_0-MTP.gguf
spec-type = draft-mtp
ctx-size = 65536
cache-type-k = q8_0
cache-type-v = q8_0

[ornith]
model = /models/llmfan46/Ornith-1.0-35B-uncensored-heretic-GGUF/Ornith-1.0-35B-uncensored-heretic-Q4_K_M.gguf
mmproj = /models/llmfan46/Ornith-1.0-35B-uncensored-heretic-GGUF/Ornith-1.0-35B-uncensored-heretic-mmproj-BF16.gguf
ctx-size = 131072
cache-type-k = q8_0
cache-type-v = q8_0
