name: ai-stack

services:

  # ── LLM Server (llama-server / llama.cpp) ────────────────────────────────────
  llm:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llm
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    ports:
      - "11434:11434"
    volumes:
      - ${LMSTUDIO_MODELS}:/models:ro
      - ./scripts/llm-entrypoint.sh:/llm-entrypoint.sh:ro
      - ./llm-presets.ini:/llm-presets.ini:ro
    environment:
      - LLAMA_MODEL=${LLAMA_MODEL}
      - LLAMA_MMPROJ=${LLAMA_MMPROJ}
      - LLAMA_CTX=${LLAMA_CTX}
      - LLAMA_MTP=${LLAMA_MTP}
      - LLAMA_PARALLEL=${LLAMA_PARALLEL}
      - LLAMA_CACHE_K=${LLAMA_CACHE_K}
      - LLAMA_CACHE_V=${LLAMA_CACHE_V}
      - LLAMA_PRESETS=${LLAMA_PRESETS}
      - LLAMA_MODELS_MAX=${LLAMA_MODELS_MAX}
    entrypoint: ["/llm-entrypoint.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Embeddings (infinity-emb) ─────────────────────────────────────────────────
  embeddings:
    image: docker.io/michaelf34/infinity:latest
    container_name: embeddings
    ports:
      - "11435:7997"
    volumes:
      - ${HF_CACHE}:/app/.cache/huggingface
    command:
      - v2
      - --model-id=BAAI/bge-m3
      - --port=7997
      - --url-prefix=/v1
    restart: unless-stopped

  # ── Speech AI ────────────────────────────────────────────────────────────────
  speaches:
    image: ghcr.io/speaches-ai/speaches:0.9.0-rc.3-cuda
    container_name: speaches
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    ports:
      - "8000:8000"
    environment:
      - WHISPER__INFERENCE_DEVICE=cuda
      - WHISPER__COMPUTE_TYPE=int8
      # TTL: in speaches 0.9.0-rc.3 top-level STT_MODEL_TTL/TTS_MODEL_TTL;
      # das fruehere WHISPER__TTL wird stillschweigend ignoriert (whisper.ttl
      # existiert im Config-Schema nicht mehr). -1 = nie entladen.
      - STT_MODEL_TTL=-1
      - TTS_MODEL_TTL=-1
      # GPU1 = Service-GPU (wie ser); llm laesst dort per tensor-split Platz
      - SPEACHES_GPU=1
      - CUDA_CACHE_PATH=/home/ubuntu/.cache/cuda
    volumes:
      - speaches-cache:/home/ubuntu/.cache/huggingface/hub
      - speaches-cuda-cache:/home/ubuntu/.cache/cuda
      - ./scripts/speaches-entrypoint.sh:/speaches-entrypoint.sh:ro
    entrypoint: ["/speaches-entrypoint.sh"]
    command: ["uvicorn", "--factory", "speaches.main:create_app"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  speaches-warmup:
    # curl-Image statt alpine: busybox-wget kann kein multipart/form-data,
    # das die Mini-Transkription unten braucht.
    image: quay.io/curl/curl:latest
    container_name: speaches-warmup
    depends_on:
      speaches:
        condition: service_healthy
    environment:
      - STT_MODEL=guillaumekln/faster-whisper-medium
      - TTS_MODEL=speaches-ai/piper-de_DE-thorsten-medium
      - TTS_VOICE=de_DE-thorsten-medium
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        echo "Registering STT: $STT_MODEL"
        curl -s -X POST "http://speaches:8000/v1/models/$STT_MODEL" || true
        echo "Registering TTS: $TTS_MODEL"
        curl -s -X POST "http://speaches:8000/v1/models/$TTS_MODEL" || true
        # Mini-TTS + Mini-Transkription: laedt piper und whisper wirklich
        # ins VRAM (POST /v1/models registriert nur). So beansprucht
        # speaches sein GPU1-Budget schon beim Stack-Start, bevor das LLM
        # laedt - nicht erst bei der ersten echten Voice-Anfrage.
        echo "Warmup TTS (piper -> VRAM)"
        curl -sf -X POST http://speaches:8000/v1/audio/speech \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"$TTS_MODEL\",\"voice\":\"$TTS_VOICE\",\"input\":\"Aufwärmen.\",\"response_format\":\"wav\"}" \
          -o /tmp/warmup.wav
        echo "Warmup STT (whisper -> VRAM)"
        curl -sf -X POST http://speaches:8000/v1/audio/transcriptions \
          -F "file=@/tmp/warmup.wav" -F "model=$STT_MODEL" -F "language=de"
        echo ""
        echo "Speaches models ready."
    restart: "no"

  # ── SER – Speech Emotion Recognition (GPU1, wav2vec2-large) ─────────────────
  ser:
    build:
      context: ./ser
    container_name: ser
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    environment:
      - CUDA_VISIBLE_DEVICES=1
    ports:
      - "0.0.0.0:8002:8002"
    volumes:
      - ${HF_CACHE}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Voice Analysis (CPU-only, Audio-Analyse + SER-backed Stimmung) ───────────
  voice-analysis:
    build:
      context: ./voice-analysis
    container_name: voice-analysis
    ports:
      - "0.0.0.0:8001:8001"
    depends_on:
      speaches:
        condition: service_healthy
      ser:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


volumes:
#  pgdata:
#    external: true
#    name: honcho_pgdata
#  redis-data:
#    external: true
#    name: honcho_redis-data
  speaches-cache:
    external: true
    name: speaches-cache
  speaches-cuda-cache:
